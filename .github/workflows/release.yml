name: Release

on:
    workflow_run:
        workflows:
            - CI
        branches:
            - develop
        types:
            - completed

permissions: write-all

jobs:
    release:
        name: Release
        # run only if the CI workflow is successful
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - name: ⬇️ Checkout
              uses:
                  actions/checkout@v4
                  # make sure to checkout the commit that triggered the CI workflow
                  # (which is not necessarily the latest commit)
              with:
                  ref: ${{ github.event.workflow_run.head_commit.id }}

            - name: ⎔ Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: "lts/*"

            - name: 🏗 Install and Build
              run: |
                  npm ci
                  npm run build

            - name: 🚀 Create/Update Release Pull Request or Publish to npm
              id: changesets
              uses: changesets/action@v1
              with:
                  version: npm run version
                  publish: npm run release
                  title: "chore(new-release)"
                  commit: "chore(new-release)"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_API_KEY }}

            - name: 🔄 Update stackoverflow.design docs
              # Only run this step if publish succeeded and actually released something
              if: steps.changesets.outputs.published == 'true'
              run: |
                  git config --global user.name 'github-actions[bot]'
                  git config --global user.email 'github-actions[bot]@users.noreply.github.com'
                  git fetch origin
                  git checkout production
                  git merge --no-ff origin/develop -m "chore: merge develop into production"
                  git push origin production
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# cancel the jobs if another workflow is kicked off for the same branch
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
