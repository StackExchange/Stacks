name: Build and Test
run-name: Build and Test

on:
  workflow_call:
    inputs:
      command:
        description: 'npm scripts command to execute'
        type: string
        required: true
      command_description:
        description: 'Description of the npm scripts command to execute'
        type: string
        required: true
      needs_playwright:
        description: 'Whether or not to install playwright'
        type: boolean
        default: false
      needs_lfs:
        description: 'Whether or not to checkout with LFS'
        type: boolean
        default: false
      changed_paths:
        description: 'Optional paths-filter config; command runs only when these paths change'
        type: string
        default: ''

jobs:
  build-and-test:
    name: ${{ inputs.command_description }}
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          lfs: ${{ inputs.needs_lfs && inputs.changed_paths == '' }}

      - name: Detect relevant changes
        id: changes
        if: inputs.changed_paths != ''
        uses: dorny/paths-filter@v3
        with:
          filters: ${{ inputs.changed_paths }}

      - name: ⏭️ Skip ${{ inputs.command_description }}
        if: steps.changes.outputs.run == 'false'
        run: echo "No relevant files changed; skipping ${{ inputs.command_description }}."

      - name: ⬇️ Pull LFS assets
        if: inputs.needs_lfs == true && steps.changes.outputs.run != 'false'
        run: git lfs pull

      - name: ⎔ Setup node
        if: steps.changes.outputs.run != 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: 🏗 Install Dependencies
        if: steps.changes.outputs.run != 'false'
        run: npm ci

      - name: 🏗 Install Playwright
        if: inputs.needs_playwright == true && steps.changes.outputs.run != 'false'
        run: npx playwright install --with-deps

      - name: 🔑 Setup SSH for private submodule
        if: steps.changes.outputs.run != 'false'
        run: |
          mkdir -p ~/.ssh
          echo -e "${SUBMODULE_SSH_KEY//_/\\n}" > ~/.ssh/id_rsa
          chmod og-rwx ~/.ssh/id_rsa
        env:
          SUBMODULE_SSH_KEY: ${{ secrets.SUBMODULE_SSH_KEY }}

      - name: ▶️ ${{ inputs.command_description }}
        if: steps.changes.outputs.run != 'false'
        run: ${{ inputs.command }}
        env:
          BETTER_AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-build-placeholder-secret' }}

      - name: ⬆️ Upload Visual Regression Test Results
        uses: actions/upload-artifact@v4
        if: ${{ failure() && inputs.command_description == 'Visual Regression Tests' }}
        with:
          name: visual-regression-test-results
          path: packages/stacks-classic/screenshots
