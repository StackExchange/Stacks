name: Build and Test
run-name: Build and Test

on:
  workflow_call:
    inputs:
      command:
        description: 'npm scripts command to execute'
        type: string
        required: true
      command_description:
        description: 'Description of the npm scripts command to execute'
        type: string
        required: true
      needs_playwright:
        description: 'Whether or not to install playwright'
        type: boolean
        default: false
      needs_lfs:
        description: 'Whether or not to checkout with LFS'
        type: boolean
        default: false

jobs:
  build-and-test:
    name: ${{ inputs.command_description }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          lfs: ${{ inputs.needs_lfs }}

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          # Pinned exactly: Node 24.16.0 regressed Playwright 1.55.1 archive
          # extraction (`playwright install` hangs); 24.15.0 is the last
          # known-good runtime (green run 26400975259, 2026-05-25). The exact
          # pin avoids lts/* / '24' drifting back onto 24.16.0. Revisit and
          # float again once Playwright is upgraded. See STACKS-901.
          node-version: '24.15.0'

      - name: 🏗 Install Dependencies
        run: npm ci

      - name: 🏗 Install Playwright
        if: inputs.needs_playwright == true
        timeout-minutes: 12
        # The browser install can stall indefinitely on the runner; without a per-attempt
        # timeout the step hangs until the 6h job ceiling. Cap each attempt and retry so a
        # stall fails fast and recovers if transient.
        run: |
          for attempt in 1 2 3; do
            echo "::group::playwright install (attempt $attempt)"
            if timeout --kill-after=30s 4m npx playwright install --with-deps; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::playwright install attempt $attempt timed out or failed; retrying"
          done
          echo "::error::playwright install failed after 3 attempts"
          exit 1

      - name: 🔑 Setup SSH for private submodule
        run: |
          mkdir -p ~/.ssh
          echo -e "${SUBMODULE_SSH_KEY//_/\\n}" > ~/.ssh/id_rsa
          chmod og-rwx ~/.ssh/id_rsa
        env:
          SUBMODULE_SSH_KEY: ${{ secrets.SUBMODULE_SSH_KEY }}

      - name: ▶️ ${{ inputs.command_description }}
        run: ${{ inputs.command }}
        env:
          BETTER_AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-build-placeholder-secret' }}

      - name: ⬆️ Upload Visual Regression Test Results
        uses: actions/upload-artifact@v4
        if: ${{ failure() && inputs.command_description == 'Visual Regression Tests' }}
        with:
          name: visual-regression-test-results
          path: packages/stacks-classic/screenshots
